<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Login - eHospital System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0b5ed7,#3b82f6);
}

.login-box{
background:white;
padding:40px;
width:380px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

.login-box h2{
margin-bottom:25px;
color:#0b5ed7;
}

.input-group{
margin-bottom:18px;
text-align:left;
}

.input-group label{
font-size:14px;
font-weight:600;
}

.input-group input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
border:none;
background:#0b5ed7;
color:white;
font-size:16px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#084298;
}

.register-link{
margin-top:15px;
display:block;
color:#0b5ed7;
text-decoration:none;
font-weight:600;
}

.register-link:hover{
text-decoration:underline;
}

.back-home{
margin-top:10px;
display:block;
color:#555;
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>eHospital Login</h2>

<form method="POST" action="/login">

<div class="input-group">
<label>User ID</label>
<input type="text" name="user_id" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit">Login</button>

</form>

<a class="register-link" href="/register_patient">
Register New Patient
</a>

<a class="back-home" href="/">
Back to Home
</a>

</div>

</body>
</html>
