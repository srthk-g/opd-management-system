<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Hospital Management System</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#0b5ed7;
color:white;
padding:20px;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:80px;
}

.card{
background:white;
padding:30px;
width:220px;
text-align:center;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:15px;
}

.btn{
display:inline-block;
padding:10px 20px;
background:#0b5ed7;
color:white;
text-decoration:none;
border-radius:5px;
font-weight:bold;
}

.btn:hover{
background:#084298;
}

footer{
text-align:center;
margin-top:80px;
color:#777;
}

</style>

</head>

<body>

<header>
<h1>Hospital Management System</h1>
<p>OPD, IPD and Inventory Management</p>
</header>

<div class="container">

<div class="card">
<h3>Patient Portal</h3>
<p>Appointments, registration and admission</p>
<a class="btn" href="/login">Login</a>
</div>

<div class="card">
<h3>Doctor Portal</h3>
<p>View appointments and record visits</p>
<a class="btn" href="/login">Login</a>
</div>

<div class="card">
<h3>Inventory Manager</h3>
<p>Medicine and consumables inventory</p>
<a class="btn" href="/login">Login</a>
</div>

</div>

<footer>
<p>eHospital System</p>
</footer>

</body>
</html>
