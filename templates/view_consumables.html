<!DOCTYPE html>
<html>

<head>
<title>Consumables Inventory</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#198754;
color:white;
padding:20px;
text-align:center;
}

table{
width:80%;
margin:40px auto;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#198754;
color:white;
}

.back{
text-align:center;
margin-top:20px;
}

a{
text-decoration:none;
color:#198754;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h2>Consumables Inventory</h2>
</header>

<table>

<tr>
<th>Item ID</th>
<th>Name</th>
<th>Stock</th>
</tr>

{% for c in consumables %}

<tr>
<td>{{ c.item_id }}</td>
<td>{{ c.name }}</td>
<td>{{ c.stock }}</td>
</tr>

{% endfor %}

</table>

<div class="back">
<a href="/inventory_dashboard">Back to Dashboard</a>
</div>

</body>
</html>
